<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coforyou Meeting Board</title>
    <link rel="stylesheet" href="./styles.css?v=20260519-5" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">COFORYOU MEETING BOARD</p>
        <h1>Meeting 重点整理</h1>
      </div>
      <div class="topbar-note">Paste summary, auto checklist.</div>
    </header>

    <main>
      <section class="department-tabs" id="departmentTabs" aria-label="部门"></section>

      <section class="input-panel">
        <div class="panel-title">
          <div>
            <p class="eyebrow">MEETING SUMMARY</p>
            <h2 id="activeDepartmentTitle">BD</h2>
          </div>
        </div>

        <div class="meeting-meta">
          <label class="field compact-field">
            <span>Meeting Title</span>
            <input id="meetingTitle" type="text" placeholder="例如：5月 BD Weekly Meeting" />
          </label>
          <label class="field compact-field">
            <span>Meeting Date</span>
            <input id="meetingDate" type="date" />
          </label>
          <label class="field compact-field">
            <span>Default Priority</span>
            <select id="defaultPriority">
              <option value="normal">Normal</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </label>
        </div>

        <textarea
          id="summaryInput"
          placeholder="把 meeting summary 直接 paste 在这里。比如：&#10;BD follow up Kiehl's rate card by Friday.&#10;Need Coco confirm whether to accept Red Chamber package.&#10;Blocker: brand has not sent product list."
        ></textarea>

        <div class="button-row">
          <button class="primary-button" id="organizeButton" type="button">预览整理</button>
          <button class="ghost-button" id="clearInputButton" type="button">清空输入</button>
        </div>

        <section class="preview-panel" id="previewPanel" hidden>
          <div class="preview-heading">
            <div>
              <p class="eyebrow">PREVIEW</p>
              <h3>确认后才会加入列表</h3>
            </div>
            <div class="preview-actions">
              <button class="ghost-button" id="cancelPreviewButton" type="button">取消预览</button>
              <button class="primary-button" id="confirmPreviewButton" type="button">加入列表</button>
            </div>
          </div>
          <div class="preview-list" id="previewList"></div>
        </section>
      </section>

      <section class="board-header">
        <div>
          <p class="eyebrow">ACTION LISTS</p>
          <h2 id="boardDepartmentTitle">BD Department</h2>
        </div>
        <div class="active-stats" id="activeDepartmentStats" aria-label="当前部门数字"></div>
      </section>

      <section class="list-grid" id="listGrid"></section>

      <section class="completed-section">
        <div class="completed-heading">
          <div>
            <p class="eyebrow">DONE</p>
            <h2>已完成</h2>
          </div>
          <span class="count-pill" id="completedCount">0</span>
        </div>
        <div class="completed-list" id="completedList"></div>
      </section>
    </main>

    <dialog class="task-modal" id="taskModal">
      <form class="modal-card" method="dialog">
        <div class="modal-heading">
          <div>
            <p class="eyebrow" id="modalDepartment">BD</p>
            <h2>事项详情</h2>
          </div>
          <button class="modal-close" id="closeModalButton" type="button" aria-label="关闭">×</button>
        </div>

        <label class="field">
          <span>事项</span>
          <textarea id="modalTaskText"></textarea>
        </label>

        <div class="modal-grid">
          <label class="field">
            <span>主标题 / Section</span>
            <input id="modalSectionTitle" type="text" />
          </label>
          <label class="field">
            <span>分类</span>
            <select id="modalCategory"></select>
          </label>
          <label class="field">
            <span>Priority</span>
            <select id="modalPriority">
              <option value="normal">Normal</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </label>
          <label class="field">
            <span>负责人</span>
            <input id="modalOwner" type="text" />
          </label>
          <label class="field">
            <span>Meeting Title</span>
            <input id="modalMeetingTitle" type="text" />
          </label>
          <label class="field">
            <span>日期</span>
            <input id="modalDue" type="text" />
          </label>
          <label class="field">
            <span>Meeting Date</span>
            <input id="modalMeetingDate" type="date" />
          </label>
        </div>

        <label class="field">
          <span>更多备注</span>
          <textarea id="modalNotes" placeholder="可以补充 context、link、下一步、Coco 决定等。"></textarea>
        </label>

        <div class="modal-actions">
          <button class="danger-button" id="deleteTaskButton" type="button">删除</button>
          <button class="ghost-button" id="cancelModalButton" type="button">取消</button>
          <button class="primary-button" id="saveTaskButton" type="button">保存</button>
        </div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js?v=20260519-5"></script>
  </body>
</html>
