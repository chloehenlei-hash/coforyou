<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coforyou Live Calendar</title>
    <link rel="stylesheet" href="./styles.css?v=20260428-2" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">COFORYOU BRAND UPDATE</p>
        <h1>直播 / 团购 / 活动排期</h1>
      </div>
      <div class="topbar-actions">
        <button class="icon-button" id="refreshButton" type="button" title="刷新数据" aria-label="刷新数据">
          ↻
        </button>
        <div class="sync-status" id="syncStatus">coforyou GOGOGO!</div>
      </div>
    </header>

    <main>
      <section class="summary-grid target-summary" aria-label="总览">
        <article class="metric highlight">
          <span>总 Target</span>
          <strong id="totalTarget">RM 0</strong>
        </article>
        <article class="metric achieved-card">
          <span>目前达到</span>
          <strong id="overallAchieved">RM 0</strong>
        </article>
      </section>

      <section class="notice-board" id="noticeBoard" aria-label="品牌重要通知">
        <div class="notice-list" id="noticeList"></div>
      </section>

      <section class="control-row" aria-label="筛选">
        <div class="month-tabs" id="monthTabs"></div>
      </section>

      <section class="workspace">
        <section class="event-panel">
          <div class="panel-heading split">
            <div>
              <h2 id="eventPanelTitle">全部活动</h2>
            </div>
            <span class="month-target-pill" id="monthTargetInline">月份 Target RM 0</span>
          </div>
          <div class="event-list" id="eventList"></div>
        </section>
      </section>

      <details class="pipeline-section">
        <summary class="panel-heading split">
          <div>
            <p class="eyebrow">BRAND PIPELINE</p>
            <h2>完整品牌表</h2>
          </div>
          <span class="muted" id="pipelineCount">0 个品牌</span>
        </summary>
        <div class="brand-table-wrap">
          <table class="brand-table">
            <thead>
              <tr>
                <th>月份</th>
                <th>日期</th>
                <th>活动</th>
                <th>品牌</th>
                <th>状态</th>
                <th>平台</th>
                <th>产品 / 配套</th>
                <th>Previous Sales</th>
                <th>Target</th>
                <th>目前 Sales</th>
                <th>重要通知</th>
                <th>重要事项</th>
              </tr>
            </thead>
            <tbody id="pipelineTable"></tbody>
          </table>
        </div>
      </details>
    </main>

    <script src="./app.js?v=20260428-2"></script>
  </body>
</html>
